<!DOCTYPE HTML>
<html lang="en">

<head>
    <title>Contact Us | Philly Crime Watch</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript>
        <link rel="stylesheet" href="assets/css/noscript.css" />
    </noscript>
</head>

<body class="is-preload">

    <div id="wrapper">

        <!-- Header -->
        <header id="header">
            <a href="index.html" class="logo">Sentinel</a>
        </header>

        <!-- Nav -->
        <nav id="nav">
            <ul class="links">
                <li><a href="index.html">Home</a></li>
                <li><a href="map.html">Crime Map</a></li>
                <li><a href="data.html">Statistics</a></li>
                <li><a href="reports.html">Reports</a></li>
                <li><a href="about.html">About Us</a></li>
                <li class="active"><a href="contact.html">Contact</a></li>

                <!-- Auth Links -->
                <li class="auth-guest"><a href="signup.html" class="nav-btn">Sign Up</a></li>
                <li class="auth-guest"><a href="login.html" class="nav-btn-outline">Login</a></li>
                <li class="auth-user" style="display: none;"><a href="profile.html">Profile</a></li>
                <li class="auth-user" style="display: none;"><a href="#"
                        class="auth-nav-logout nav-btn-outline">Logout</a></li>
            </ul>
            <ul class="icons">
                <li>
                    <a href="https://gitlab.com/yourusername/phillycrimewatch" class="icon brands fa-gitlab">
                        <span class="label">GitLab</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main -->
        <div id="main">
            <section class="post">
                <header class="major">
                    <h1>Contact Us</h1>
                    <p>We'd love to hear from you. Please fill out the form below.</p>
                </header>

                <form id="contact-form">
                    <div class="fields">
                        <div class="field">
                            <label>Name</label>
                            <input type="text" name="name" id="contact-name" required />
                        </div>
                        <div class="field">
                            <label>Email</label>
                            <input type="email" name="email" id="contact-email" required />
                        </div>
                        <div class="field">
                            <label>Message</label>
                            <textarea name="message" id="contact-message" rows="4" required></textarea>
                        </div>
                    </div>

                    <ul class="actions special">
                        <li><button type="submit" class="button primary" id="contact-submit">Send Message</button></li>
                    </ul>
                </form>
            </section>
        </div>

        <!-- Footer -->
        <footer id="footer">
            <section class="split contact">
                <section class="alt">
                    <h3>Address</h3>
                    <p>Philadelphia, PA</p>
                </section>
                <section>
                    <h3>Email</h3>
                    <p><a href="mailto:info@phillycrimewatch.org">info@phillycrimewatch.org</a></p>
                </section>
            </section>
        </footer>

    </div>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/nav-auth.js"></script>

    <script>
        document.getElementById('contact-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('contact-submit');
            btn.innerText = "Sending...";
            btn.disabled = true;

            const name = document.getElementById('contact-name').value;
            const email = document.getElementById('contact-email').value;
            const message = document.getElementById('contact-message').value;

            try {
                const response = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, message })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(data.message);
                    document.getElementById('contact-form').reset();
                } else {
                    alert("Error: " + data.error);
                }
            } catch (err) {
                alert("A network error occurred.");
            } finally {
                btn.innerText = "Send Message";
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
