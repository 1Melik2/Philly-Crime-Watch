<!DOCTYPE HTML>
<html lang="en">

<head>
  <title>Login | Philly Crime Watch</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <noscript>
    <link rel="stylesheet" href="assets/css/noscript.css" />
  </noscript>
</head>

<body class="is-preload">

  <div id="wrapper">

    <!-- Header -->
    <header id="header">
      <a href="index.html" class="logo">Sentinel</a>
    </header> <!-- Nav -->
    <nav id="nav">
      <ul class="links">
        <li><a href="index.html">Home</a></li>
        <li><a href="map.html">Crime Map</a></li>
        <li><a href="data.html">Statistics</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="contact.html">Contact</a></li>

        <!-- Auth Links -->
        <li class="auth-guest"><a href="signup.html" class="nav-btn">Sign Up</a></li>
        <li class="auth-guest"><a href="login.html" class="nav-btn-outline">Login</a></li>
        <li class="auth-user" style="display: none;"><a href="profile.html">Profile</a></li>
        <li class="auth-user" style="display: none;"><a href="#" class="auth-nav-logout nav-btn-outline">Logout</a></li>
      </ul>
      <ul class="icons">
        <li>
          <a href="https://gitlab.com/yourusername/phillycrimewatch" class="icon brands fa-gitlab">
            <span class="label">GitLab</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Main -->
    <div id="main">
      <section class="post">
        <header class="major">
          <h1>Login</h1>
          <p>Access your Philly Crime Watch account</p>
        </header>

        <form id="login-form">
          <div class="fields">
            <div class="field">
              <label>Email</label>
              <input type="email" name="email" id="email" required />
            </div>

            <div class="field">
              <label>Password</label>
              <input type="password" name="password" id="password" required />
            </div>
          </div>

          <ul class="actions special">
            <li><button type="submit" class="button primary">Login</button></li>
          </ul>

          <p style="text-align:center;">
            Don't have an account? <a href="signup.html">Sign up here</a>.
          </p>
        </form>

        <script>
          document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault(); // Prevent standard form submission

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
              const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
              });

              if (response.ok) {
                alert("You have successfully logged in!");
                window.location.href = 'index.html';
              } else {
                const errorText = await response.text();
                alert("Login failed: " + errorText);
              }
            } catch (error) {
              console.error('Error during login:', error);
              alert("A network error occurred. Please try again later.");
            }
          });
        </script>
      </section>
    </div>

    <!-- Footer -->
    <footer id="footer">
      <section class="split contact">
        <section class="alt">
          <h3>Address</h3>
          <p>Philadelphia, PA</p>
        </section>
        <section>
          <h3>Email</h3>
          <p><a href="mailto:info@phillycrimewatch.org">info@phillycrimewatch.org</a></p>
        </section>
      </section>
    </footer>

  </div>

  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/nav-auth.js"></script>
</body>

</html>
